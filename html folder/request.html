<!DOCTYPE html>
<html>
<head>
  <title>Book Transport - FTMS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">FTMS</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="request.html">Book Transport</a></li>
      
    </ul>
  </nav>

  <!-- Request Form -->
  <div class="request-container">
    <h2>Transport Request</h2>

    <form onsubmit="submitRequest(event)">

      <h3>Pickup Details</h3>
      <input type="text" id="pickup" placeholder="Pickup Location" required>

      <h3>Destination</h3>
      <input type="text" id="destination" placeholder="Destination" required>

      <h3>Crop & Load</h3>
      <input type="text" id="crop" placeholder="Crop Type (Wheat, Rice)">
      <input type="number" id="load" placeholder="Load (kg)" required>

      <h3>Transport Details</h3>
      <input type="number" id="distance" placeholder="Distance (km)" required>
      <input type="date" id="date" required>

      <button type="submit">Submit Request</button>

    </form>

    <h3 id="price"></h3>
  </div>

  <script src="script.js"></script>

</body>
</html>
